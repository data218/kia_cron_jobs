<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KIA Insurance Panel</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #e8f0fe;
  --panel: #ffffff;
  --card: #ffffff;
  --card-hover: #f0f5ff;
  --border: #d0dce8;
  --text: #000000;
  --muted: #2a2a2a;
  --accent: #f59e0b;
  --green: #22c55e;
  --red: #ef4444;
  --blue: #3b82f6;
  --radius: 10px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Inter','Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; }

/* TOP BAR */
.topbar { background:var(--panel); border-bottom:1px solid var(--border); padding:0 24px; height:52px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.topbar-left { display:flex; align-items:center; gap:12px; }
.topbar-left .logo { width:28px; height:28px; background:var(--accent); border-radius:6px; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:13px; color:#000; }
.topbar-left h1 { font-size:15px; font-weight:600; letter-spacing:0.3px; }
.topbar-left .ver { font-size:11px; color:var(--muted); background:var(--card); padding:2px 8px; border-radius:4px; }
.topbar-right { display:flex; align-items:center; gap:10px; }
.btn-icon { background:var(--card); border:1px solid var(--border); color:var(--muted); width:32px; height:32px; border-radius:6px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:14px; transition:.15s; text-decoration:none; }
.btn-icon:hover { background:var(--card-hover); color:var(--text); }

/* BUTTON PANEL */
.btns-wrap { background:var(--panel); border-bottom:1px solid var(--border); padding:10px 24px; display:flex; gap:8px; flex-wrap:wrap; align-items:center; flex-shrink:0; }
.btn-group { display:flex; gap:4px; align-items:center; }
.btn-group .g-label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:0.8px; margin-right:6px; font-weight:600; }
.pbtn { padding:6px 14px; border:1px solid var(--border); border-radius:6px; background:var(--card); color:var(--muted); font-size:12px; font-weight:500; cursor:pointer; transition:.12s; white-space:nowrap; }
.pbtn:hover { background:var(--card-hover); color:var(--text); border-color:#3a3f5a; }
.pbtn.active { background:var(--accent); color:#000; border-color:var(--accent); font-weight:600; }
.pbtn.green.active { background:var(--green); border-color:var(--green); }
.pbtn.red.active { background:var(--red); border-color:var(--red); }
.pbtn.blue.active { background:var(--blue); border-color:var(--blue); }
.pbtn.dark.active { background:#1a2a3a; color:#fff; border-color:#1a2a3a; }
.divider { width:1px; height:24px; background:var(--border); margin:0 4px; }

/* MAIN PANEL */
.main { flex:1; padding:16px 24px; overflow-y:auto; display:flex; flex-direction:column; gap:14px; }
.main::-webkit-scrollbar { width:4px; }
.main::-webkit-scrollbar-track { background:transparent; }
.main::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

/* KPI ROW */
.kpi-row { display:grid; grid-template-columns:repeat(auto-fit, minmax(150px, 1fr)); gap:10px; flex-shrink:0; }
.kpi { background:var(--card); border-radius:var(--radius); padding:14px 16px; border-left:3px solid var(--accent); }
.kpi .k-label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; font-weight:600; }
.kpi .k-value { font-size:22px; font-weight:700; margin:3px 0 1px; letter-spacing:-0.3px; }
.kpi .k-sub { font-size:11px; color:var(--muted); }
.kpi.b-green { border-left-color:var(--green); }
.kpi.b-red { border-left-color:var(--red); }
.kpi.b-blue { border-left-color:var(--blue); }

/* CHART + TABLE ROW */
.chart-section { background:var(--card); border-radius:var(--radius); padding:16px; flex:1; display:flex; flex-direction:column; min-height:0; }
.chart-section h3 { font-size:13px; font-weight:600; margin-bottom:8px; display:flex; align-items:center; gap:8px; flex-shrink:0; }
.chart-section h3 .hint { font-size:11px; color:var(--muted); font-weight:400; }
.chart-section .chart-wrap { flex:1; position:relative; min-height:0; }
.chart-section .chart-wrap canvas { width:100% !important; height:100% !important; max-height:260px; }

.table-section { background:var(--card); border-radius:var(--radius); padding:0; overflow:hidden; flex-shrink:0; max-height:180px; display:flex; flex-direction:column; }
.table-section .t-header { display:flex; justify-content:space-between; align-items:center; padding:10px 16px; border-bottom:1px solid var(--border); flex-shrink:0; }
.table-section .t-header h3 { font-size:12px; font-weight:600; }
.table-section .t-header .t-info { font-size:11px; color:var(--muted); }
.table-wrap { overflow-y:auto; flex:1; }
.table-wrap::-webkit-scrollbar { width:4px; }
.table-wrap::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
table { width:100%; border-collapse:collapse; font-size:12px; }
thead th { position:sticky; top:0; background:var(--panel); padding:7px 12px; font-size:10px; text-transform:uppercase; letter-spacing:0.5px; color:var(--muted); font-weight:600; text-align:left; border-bottom:1px solid var(--border); }
tbody td { padding:6px 12px; border-bottom:1px solid #f0f0f0; color:var(--text); }
tbody tr:hover td { background:var(--card-hover); }

.badge { display:inline-flex; align-items:center; gap:3px; padding:2px 8px; border-radius:10px; font-size:10px; font-weight:600; }
.badge.green { background:rgba(34,197,94,.15); color:var(--green); }
.badge.red { background:rgba(239,68,68,.15); color:var(--red); }
.badge.blue { background:rgba(59,130,246,.15); color:var(--blue); }
.badge.gray { background:rgba(139,143,168,.15); color:var(--muted); }

.loader { display:flex; align-items:center; justify-content:center; padding:60px; gap:10px; color:var(--muted); font-size:13px; }
.spin { width:20px; height:20px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:sp .7s linear infinite; }
@keyframes sp { to { transform:rotate(360deg); } }

.collapsed { display:none; }

@media (max-width:700px) {
  .topbar { padding:0 12px; }
  .btns-wrap { padding:8px 12px; gap:6px; }
  .main { padding:10px 12px; }
  .kpi-row { grid-template-columns:repeat(2,1fr); }
  .btn-group .g-label { display:none; }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div style="width:28px;height:28px;background:#000;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 25" fill="#fff" style="width:22px;height:auto"><path d="M58.02 21.83c0 .19.06.3.17.3.09-.01.17-.05.24-.1L89.6 1.8a3 3 0 011.8-.54h6.85c1.05 0 1.76.7 1.76 1.75v13.08c0 1.58-.35 2.5-1.75 3.34l-8.31 5a.57.57 0 01-.28.1c-.1 0-.2-.08-.2-.37V8.9c0-.18-.05-.3-.17-.3a.47.47 0 00-.24.1l-22.78 14.8c-.52.35-1.13.54-1.75.53h-15.1c-1.06 0-1.76-.7-1.76-1.76V3.42c0-.14-.06-.27-.18-.27a.49.49 0 00-.24.1l-15.03 9.02c-.15.1-.19.17-.19.24 0 .06.03.12.13.23L42.9 23.47c.14.14.24.25.24.37 0 .1-.16.18-.35.18h-9.7c-.76 0-1.35-.11-1.76-.52L24.82 17a.28.28 0 00-.2-.1.43.43 0 00-.2.06L13.54 23.5c-.66.4-1.11.51-1.76.51H1.77C.7 24.02 0 23.31 0 22.26V9.43c0-1.59.35-2.5 1.76-3.34l8.36-5.02a.43.43 0 01.22-.07c.13 0 .2.13.2.42V18.6c0 .18.04.26.17.26.09-.01.17-.05.25-.1L39.2 1.77c.54-.37 1.2-.55 1.86-.52h15.2c1.05 0 1.76.7 1.76 1.75l-.01 18.83z"/></svg></div>
    <h1>KIA Insurance Panel</h1>
    <span class="ver">v1.0</span>
  </div>
  <div class="topbar-right">
    <span id="welcomeUser" style="font-size:11px;color:var(--muted);font-weight:500"></span>
    <button class="btn-icon" id="viewToggle" onclick="toggleToolbar()" title="Toggle Toolbar" style="font-size:16px;font-weight:700">&#x2630;</button>
    <a href="/" class="btn-icon" title="Home">&#8962;</a>
    <span style="font-size:11px;color:var(--muted)" id="updatedAt"></span>
    <button class="btn-icon" onclick="refreshAll()" title="Refresh">↻</button>
  </div>
</div>

<div class="btns-wrap collapsed" id="toolbarPanel">
  <div class="btn-group">
    <span class="g-label">View</span>
    <button class="pbtn active" data-view="all" onclick="setView('all')">📋 All</button>
    <button class="pbtn blue" data-view="new" onclick="setView('new')">🆕 New</button>
    <button class="pbtn green" data-view="renewal" onclick="setView('renewal')">🔄 Renewal</button>
    <button class="pbtn red" data-view="high" onclick="setView('high')">⭐ High Premium</button>
  </div>
  <div class="divider"></div>
  <div class="btn-group">
    <span class="g-label">Chart</span>
    <button class="pbtn active" data-chart="trend" onclick="setChart('trend')">📈 Trend</button>
    <button class="pbtn" data-chart="model" onclick="setChart('model')">Model</button>
    <button class="pbtn" data-chart="company" onclick="setChart('company')">🏢 Company</button>
    <button class="pbtn" data-chart="state" onclick="setChart('state')">🗺️ State</button>
    <button class="pbtn" data-chart="renewal" onclick="setChart('renewal')">🔄 Renewal</button>
    <button class="pbtn" data-chart="mfg-year" onclick="setChart('mfg-year')">🏭 MFG Year</button>
    <button class="pbtn" data-chart="payment" onclick="setChart('payment')">💳 Payment</button>
    <button class="pbtn" data-chart="dealer" onclick="setChart('dealer')">🏪 Dealer</button>
    <button class="pbtn" data-chart="premium-dist" onclick="setChart('premium-dist')">📊 Premium Dist</button>
    <button class="pbtn" data-chart="growth" onclick="setChart('growth')">📈 Growth</button>
    <button class="pbtn" data-chart="calculations" onclick="setChart('calculations')">🧮 Calc</button>
  </div>
  <div class="divider"></div>
  <div class="btn-group" id="yearFilterGroup">
    <span class="g-label">Year</span>
    <select id="yearSelect" onchange="setYear(this.value)" style="padding:5px 10px;border:1px solid var(--border);border-radius:6px;background:var(--card);color:var(--text);font-size:12px;font-weight:500;cursor:pointer;outline:none;">
      <option value="all">All Years</option>
    </select>
  </div>
  <div class="btn-group" id="yearCompareGroup" style="display:none">
    <span class="g-label">Compare</span>
    <select id="yearFrom" onchange="render()" style="padding:5px 10px;border:1px solid var(--border);border-radius:6px;background:var(--card);color:var(--text);font-size:12px;font-weight:500;cursor:pointer;outline:none;"></select>
    <span style="color:var(--muted);font-size:11px;margin:0 4px;">vs</span>
    <select id="yearTo" onchange="render()" style="padding:5px 10px;border:1px solid var(--border);border-radius:6px;background:var(--card);color:var(--text);font-size:12px;font-weight:500;cursor:pointer;outline:none;"></select>
    <button onclick="setChart('trend')" style="padding:4px 10px;border:1px solid var(--border);border-radius:6px;background:var(--card);color:var(--muted);font-size:11px;cursor:pointer;margin-left:4px">✕ Clear</button>
  </div>
  <div class="btn-group" id="monthCompareGroup" style="display:none">
    <span class="g-label">Compare</span>
    <select id="monthFrom" onchange="render()" style="padding:5px 10px;border:1px solid var(--border);border-radius:6px;background:var(--card);color:var(--text);font-size:12px;font-weight:500;cursor:pointer;outline:none;"></select>
    <span style="color:var(--muted);font-size:11px;margin:0 4px;">vs</span>
    <select id="monthTo" onchange="render()" style="padding:5px 10px;border:1px solid var(--border);border-radius:6px;background:var(--card);color:var(--text);font-size:12px;font-weight:500;cursor:pointer;outline:none;"></select>
    <button onclick="setChart('trend')" style="padding:4px 10px;border:1px solid var(--border);border-radius:6px;background:var(--card);color:var(--muted);font-size:11px;cursor:pointer;margin-left:4px">✕ Clear</button>
  </div>
  <div class="divider"></div>
  <div class="btn-group">
    <span class="g-label">Model</span>
    <select id="modelSelect" onchange="setModel(this.value)" style="padding:5px 10px;border:1px solid var(--border);border-radius:6px;background:var(--card);color:var(--text);font-size:12px;font-weight:500;cursor:pointer;outline:none;">
      <option value="all">All Models</option>
    </select>
  </div>
  <div class="divider"></div>
  <div class="btn-group">
    <span class="g-label">Company</span>
    <select id="companySelect" onchange="setCompany(this.value)" style="padding:5px 10px;border:1px solid var(--border);border-radius:6px;background:var(--card);color:var(--text);font-size:12px;font-weight:500;cursor:pointer;outline:none;">
      <option value="all">All Companies</option>
    </select>
  </div>
  <div class="divider"></div>
  <div class="btn-group">
    <button class="pbtn dark" data-chart="comparison" onclick="setChart('comparison')">📊 Year Comparison</button>
    <button class="pbtn dark" data-chart="month-compare" onclick="setChart('month-compare')">📅 Month Comparison</button>
  </div>
</div>

<div class="main" id="mainArea">
  <div class="loader"><div class="spin"></div>Loading dashboard...</div>
</div>

<script>
(function(){var t=new URLSearchParams(location.search).get('token');if(t)localStorage.setItem('authToken',t)}());
(function(){var t=localStorage.getItem('authToken');if(!t){location.href='/'}else{fetch('/api/auth/verify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:t})}).then(function(r){return r.json()}).then(function(v){if(!v.valid){localStorage.removeItem('authToken');location.href='/'}else{var el=document.getElementById('welcomeUser');if(el)el.textContent='Welcome '+v.user.username;}}).catch(function(){})}})();
const labelPlugin = {
  id:'labelPlugin',
  afterDraw(chart) {
    const {ctx,data} = chart;
    if(!data?.datasets?.length) return;
    ctx.save();
    ctx.font = 'bold 10px Inter,sans-serif';
    ctx.textAlign = 'center';
    for(let ds=0; ds<data.datasets.length; ds++) {
      const meta = chart.getDatasetMeta(ds);
      if(!meta?.data?.length) continue;
      meta.data.forEach((el,i)=>{
        let val = data.datasets[ds].data[i];
        if(val==null) return;
        const act = data.datasets[ds]._actual;
        if(!act && val===0) return;
        const label = (data.datasets[ds].label||'').toLowerCase();
        if(act && act[i] !== undefined) {
          const barCenter = (el.y + el.base) / 2;
          ctx.fillStyle = '#000000';
          ctx.font = 'bold 9px Inter,sans-serif';
          ctx.textBaseline = val < 0 ? 'top' : 'bottom';
          const labelY = val < 0 ? el.y + 4 : el.y - 4;
          if(Math.abs(val)>=1) ctx.fillText((val>0?'+':'')+val+'%', el.x, labelY);
          ctx.textBaseline = 'middle';
          ctx.fillStyle = '#ffffff';
          ctx.font = 'bold 10px Inter,sans-serif';
          ctx.fillText(act[i], el.x, barCenter);
          return;
        }
        if(label.includes('premium')||label.includes('idv')) val = '₹'+(val/100).toFixed(1)+'L';
        ctx.fillStyle = '#000000';
        ctx.textBaseline = 'bottom';
        if(chart.config.type==='doughnut') {
          ctx.fillStyle = '#fff';
          ctx.font = 'bold 11px Inter,sans-serif';
          ctx.textBaseline = 'middle';
          const angle = el.startAngle + (el.endAngle - el.startAngle)/2;
          const r = el.outerRadius * 0.65;
          const x = el.x + r * Math.cos(angle);
          const y = el.y + r * Math.sin(angle);
          ctx.fillText(val, x, y);
        } else if(chart.config._config.options?.indexAxis==='y') {
          ctx.textAlign = 'left';
          ctx.textBaseline = 'middle';
          ctx.fillText(val, el.x + 4, el.y);
        } else {
          const isStacked = chart.options?.scales?.x?.stacked;
          if(isStacked) {
            ctx.textBaseline = 'middle';
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 10px Inter,sans-serif';
            ctx.fillText(val, el.x, (el.y + el.base) / 2);
          } else {
            ctx.textBaseline = 'bottom';
            ctx.fillStyle = '#000000';
            ctx.fillText(val, el.x, el.y - 4);
          }
        }
      });
    }
    ctx.restore();
  }
};
Chart.defaults.plugins.tooltip.backgroundColor = '#ffffff';
Chart.defaults.plugins.tooltip.titleColor = '#000000';
Chart.defaults.plugins.tooltip.bodyColor = '#2a2a2a';
Chart.defaults.plugins.tooltip.borderColor = '#d0dce8';
Chart.defaults.plugins.tooltip.borderWidth = 1;
Chart.defaults.plugins.tooltip.padding = 10;
Chart.defaults.plugins.tooltip.cornerRadius = 6;
Chart.defaults.plugins.tooltip.boxPadding = 4;
Chart.defaults.plugins.tooltip.yAlign = 'top';
Chart.defaults.plugins.tooltip.position = 'nearest';
Chart.register(labelPlugin);
let allData=[], vinDetail=[], charts={};
let curView='all', curChart='trend', curYear='all', curModel='all', curCompany='all';

function getYear(s) {
  if (!s) return NaN;
  const m = s.match(/(\d{4})/);
  return m ? parseInt(m[1]) : NaN;
}
function getMonth(s) {
  if (!s) return NaN;
  if (/^\d{4}-\d{2}/.test(s)) return parseInt(s.substring(5,7));
  const parts = s.split('/');
  if (parts.length >= 2) return parseInt(parts[0]);
  return NaN;
}
function getYm(s) {
  if (!s) return '';
  if (/^\d{4}-\d{2}/.test(s)) return s.substring(0,7);
  const m = s.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if (m) return m[3] + '-' + String(parseInt(m[1])).padStart(2,'0');
  return '';
}

async function refreshAll() {
  document.getElementById('mainArea').innerHTML = '<div class="loader"><div class="spin"></div>Loading...</div>';
  await loadData();
}

async function loadData() {
  try {
    const [dR, aR, vR] = await Promise.all([
      fetch('/api/data'), fetch('/api/renewal-analysis'), fetch('/api/renewal-detail')
    ]);
    const d=await dR.json(), a=await aR.json(), v=await vR.json();
    if(d.error) throw Error(d.error);
    allData=d.rows; vinDetail=v.detail||[];
    allData = allData.filter(r => r.cancelled !== 'Yes');
    const yrs = [...new Set(allData.map(r=>getYear(r.create_date)).filter(v=>!isNaN(v)).map(String))].sort();
    const sel = document.getElementById('yearSelect');
    sel.innerHTML = '<option value="all">All Years</option>' + yrs.map(y=>'<option value="'+y+'">'+y+'</option>').join('');
    const fromSel = document.getElementById('yearFrom'), toSel = document.getElementById('yearTo');
    const opts = yrs.map(y=>'<option value="'+y+'">'+y+'</option>').join('');
    fromSel.innerHTML = opts; toSel.innerHTML = opts;
    if(yrs.length>1) { fromSel.value=yrs[yrs.length-2]; toSel.value=yrs[yrs.length-1]; }
    const mths = [...new Set(allData.map(r=>getYm(r.create_date)).filter(Boolean))].sort();
    const mFrom = document.getElementById('monthFrom'), mTo = document.getElementById('monthTo');
    const mOpts = mths.map(m=>'<option value="'+m+'">'+new Date(m+'-01').toLocaleString('en',{month:'short',year:'numeric'})+'</option>').join('');
    mFrom.innerHTML = mOpts; mTo.innerHTML = mOpts;
    if(mths.length>1) { mFrom.value=mths[mths.length-2]; mTo.value=mths[mths.length-1]; }
    const models = [...new Set(allData.map(r=>r.model).filter(Boolean))].sort();
    const mSel = document.getElementById('modelSelect');
    mSel.innerHTML = '<option value="all">All Models</option>' + models.map(m=>'<option value="'+m+'">'+m+'</option>').join('');
    const companies = [...new Set(allData.map(r=>r.insurancecompany).filter(Boolean))].sort();
    const cSel = document.getElementById('companySelect');
    cSel.innerHTML = '<option value="all">All Companies</option>' + companies.map(c=>'<option value="'+c+'">'+c+(c.length>25?'':'')+'</option>').join('');
    document.getElementById('updatedAt').textContent = new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
    render();
  } catch(e) {
    document.getElementById('mainArea').innerHTML = `<div class="loader" style="color:var(--red)">❌ ${e.message}</div>`;
  }
}

function setView(v) {
  curView=v;
  document.querySelectorAll('[data-view]').forEach(b=>b.classList.toggle('active',b.dataset.view===v));
  render();
}
function setChart(c) {
  curChart=c;
  document.querySelectorAll('[data-chart]').forEach(b=>b.classList.toggle('active',b.dataset.chart===c));
  const isCmp = c==='comparison';
  const isMCmp = c==='month-compare';
  document.getElementById('yearFilterGroup').style.display = (isCmp||isMCmp) ? 'none' : 'flex';
  document.getElementById('yearCompareGroup').style.display = isCmp ? 'flex' : 'none';
  document.getElementById('monthCompareGroup').style.display = isMCmp ? 'flex' : 'none';
  render();
}
function setYear(y) {
  curYear=y;
  render();
}
function setModel(m) {
  curModel=m;
  render();
}
function setCompany(c) {
  curCompany=c;
  render();
}

function getData() {
  let d = allData;
  if(curChart==='comparison') {
    const y1 = document.getElementById('yearFrom')?.value;
    const y2 = document.getElementById('yearTo')?.value;
    if(y1&&y2) d = d.filter(r=>r.create_date?.startsWith(y1)||r.create_date?.startsWith(y2));
  } else if(curChart==='month-compare') {
    const m1 = document.getElementById('monthFrom')?.value;
    const m2 = document.getElementById('monthTo')?.value;
    if(m1&&m2) d = d.filter(r=>r.create_date?.startsWith(m1)||r.create_date?.startsWith(m2));
  } else if(curYear!=='all') {
    d = d.filter(r=>r.create_date?.startsWith(curYear));
  }
  if(curModel!=='all') d = d.filter(r=>r.model===curModel);
  if(curCompany!=='all') d = d.filter(r=>r.insurancecompany===curCompany);
  if(curView==='new') d = d.filter(r=>r.policytype==='New');
  else if(curView==='renewal') d = d.filter(r=>r.policytype==='Renewal');
  else if(curView==='high') d = d.filter(r=>(Number(r.grosspremium)||0)>=50000);
  return d;
}

function fmt(n) { return (n||0).toLocaleString('en-IN'); }

function render() {
  const d = getData();
  const area = document.getElementById('mainArea');
  let chartHtml='', tableHtml='';

  // KPI
  const tp = d.reduce((s,r)=>s+(Number(r.grosspremium)||0),0);

  const nc = d.filter(r=>r.policytype==='New').length;
  const rc = d.filter(r=>r.policytype==='Renewal').length;

function drawGrowth(d) {
  const m={}; d.forEach(r=>{const k=r.create_date?.substring(0,7); if(!k)return; if(!m[k])m[k]={p:0,pr:0}; m[k].p++; m[k].pr+=Number(r.grosspremium)||0;});
  const labels=Object.keys(m).sort();
  if(labels.length<2) return;
  const pCounts=[], prAmounts=[], pGrowth=[], prGrowth=[];
  pCounts.push(m[labels[0]].p); prAmounts.push(Math.round(m[labels[0]].pr/1000));
  pGrowth.push(5); prGrowth.push(5);
  for(let i=1;i<labels.length;i++) {
    const prev=m[labels[i-1]], cur=m[labels[i]];
    pCounts.push(cur.p); prAmounts.push(Math.round(cur.pr/1000));
    pGrowth.push(prev.p?Math.round((cur.p-prev.p)/prev.p*100):0);
    prGrowth.push(prev.pr?Math.round((cur.pr-prev.pr)/prev.pr*100):0);
  }
  const fmtLabels=labels.map(m=>{const d=new Date(m+'-01'); return d.toLocaleString('en',{month:'short',year:'numeric'});});
  const pMin=Math.min(...pGrowth), pMax=Math.max(...pGrowth);
  const prMin=Math.min(...prGrowth), prMax=Math.max(...prGrowth);
  const pRange=Math.max(Math.abs(pMin),Math.abs(pMax),8,1);
  const prRange=Math.max(Math.abs(prMin),Math.abs(prMax),8,1);
  const ctx=document.getElementById('mainChart').getContext('2d');
  charts.main=new Chart(ctx,{type:'bar',data:{labels:fmtLabels,datasets:[
    {label:'Policy Growth %',data:pGrowth,backgroundColor:pGrowth.map(v=>v<0?'#ef4444':'#22c55e'),borderRadius:4,_actual:pCounts},

  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{boxWidth:10,color:'#6b7280',padding:8}}},scales:{
    x:{ticks:{color:'#6b7280',font:{size:10}},grid:{color:'rgba(0,0,0,.06)'}},

    y1:{position:'right',min:-prRange,max:prRange,ticks:{color:'#6b7280',font:{size:10},callback:v=>v+'%'},grid:{drawOnChartArea:false},title:{display:true,text:'Premium Growth %',color:'#6b7280'}}
  }}});
}

      const nw = [...currentVins].filter(v=>!prevVins.has(v) && !allPrevVins.has(v)).length;
      const lap = [...prevVins].filter(v=>!currentVins.has(v)).length;
      rows.push(['Year: '+yr, fmt(rol)+' Rollover, '+fmt(ren)+' Renewal, '+fmt(nw)+' New, '+fmt(lap)+' Lapsed', '', 'VIN year-over-year: same VIN prev+curr=Rollover, gap then return=Renewal, first time=New']);
      currentVins.forEach(v=>allPrevVins.add(v));
    });
  } else if (curChart === 'mfg-year') {
    const m = {}; d.forEach(r=>{const k=r.mfg_year; if(k)m[k]=(m[k]||0)+1;});
    Object.entries(m).sort((a,b)=>b[1]-a[1]).forEach(([k,v])=>rows.push(['MFG Year: '+k, fmt(v)+' policies', '', 'count by mfg_year']));
  } else if (curChart === 'payment') {
    const m = {}; d.forEach(r=>{const k=r.paymentmode; if(k)m[k]=(m[k]||0)+1;});
    Object.entries(m).sort((a,b)=>b[1]-a[1]).forEach(([k,v])=>rows.push(['Payment: '+k, fmt(v)+' policies, '+Math.round(v/d.length*100)+'%', '', 'count by paymentmode']));
  } else if (curChart === 'dealer') {
    const m = {}; d.forEach(r=>{const k=r.dealer; if(k)m[k]=(m[k]||0)+1;});
    Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,15).forEach(([k,v])=>rows.push(['Dealer: '+(k.length>25?k.substring(0,22)+'...':k), fmt(v)+' policies', '', 'count by dealer']));
  } else if (curChart === 'premium-dist') {
    const b={'₹0 – ₹10K':0,'₹10K – ₹25K':0,'₹25K – ₹50K':0,'₹50K – ₹1L':0,'₹1L+':0};
    d.forEach(r=>{const p=Number(r.grosspremium)||0; if(p<10000)b['₹0 – ₹10K']++; else if(p<25000)b['₹10K – ₹25K']++; else if(p<50000)b['₹25K – ₹50K']++; else if(p<100000)b['₹50K – ₹1L']++; else b['₹1L+']++;});
    Object.entries(b).forEach(([k,v])=>rows.push(['Bucket: '+k, fmt(v)+' policies, '+Math.round(v/d.length*100)+'%', '', 'grosspremium range distribution']));
  } else if (curChart === 'growth') {
    const m = {}; d.forEach(r=>{const k=r.create_date?.substring(0,7); if(!k)return; if(!m[k])m[k]={p:0,pr:0}; m[k].p++; m[k].pr+=Number(r.grosspremium)||0;});
    const labels=Object.keys(m).sort();
    rows.push(['Base: '+labels[0], fmt(m[labels[0]].p)+' policies, ₹'+(m[labels[0]].pr/1000).toFixed(0)+'K premium', 'Base month (bar set to 5% for visibility)', 'first month, no prior comparison']);
    for(let i=1;i<labels.length;i++) {
      const prev=m[labels[i-1]], cur=m[labels[i]];
      const pG=prev.p?Math.round((cur.p-prev.p)/prev.p*100):0;
      const prG=prev.pr?Math.round((cur.pr-prev.pr)/prev.pr*100):0;
      rows.push(['Month: '+labels[i], fmt(cur.p)+' policies, ₹'+(cur.pr/1000).toFixed(0)+'K premium', 'Policy: '+(pG>0?'+':'')+pG+'%, Premium: '+(prG>0?'+':'')+prG+'%', '(cur-prev)/prev×100']);
    }
  }
  return rows;
}

function drawCalculations(d) {
  const tp = d.reduce((s,r)=>s+(Number(r.grosspremium)||0),0);
  const tidv = d.reduce((s,r)=>s+(Number(r.totalidv)||0),0);
  const nc = d.filter(r=>r.policytype==='New').length;
  const rc = d.filter(r=>r.policytype==='Renewal').length;
  const uv = new Set(d.map(r=>r.vinno).filter(Boolean)).size;
  const co = new Set(d.map(r=>r.insurancecompany)).size;
  const mo = new Set(d.map(r=>r.model)).size;
  const kpiRows = [
    ['KPI: Policies', 'count of all rows after filters', fmt(d.length), '-'],
    ['KPI: New Policies', 'count where policytype === "New"', fmt(nc), '-'],
    ['KPI: Renewal Policies', 'count where policytype === "Renewal"', fmt(rc), '-'],
    ['KPI: Gross Premium', 'sum of grosspremium for filtered rows', '₹'+(tp/100000).toFixed(1)+'L', '₹'+(tp/100000).toFixed(1)+'L / ₹'+(tp/10000000).toFixed(1)+'Cr'],
    ['KPI: Avg Premium', 'gross premium / policy count', '₹'+fmt(Math.round(tp/(d.length||1))), '-'],
    ['KPI: Unique VINs', 'count of distinct vinno values', fmt(uv), '-'],
    ['KPI: Total IDV', 'sum of totalidv for filtered rows', '₹'+(tidv/10000000).toFixed(1)+'Cr', '-'],
  ];
  const filtRows = [
    ['Filter: Year', 'create_date starts with selected year', curYear==='all' ? 'All' : curYear, 'getData() → create_date?.startsWith(year)'],
    ['Filter: Model', 'model === selected model', curModel==='all' ? 'All' : curModel, 'getData() → r.model===curModel'],
    ['Filter: Company', 'insurancecompany === selected company', curCompany==='all' ? 'All' : curCompany, 'getData() → r.insurancecompany===curCompany'],
    ['Filter: View (New)', 'policytype === "New"', curView==='new' ? 'Active' : '-', 'getData() → r.policytype==="New"'],
    ['Filter: View (Renewal)', 'policytype === "Renewal"', curView==='renewal' ? 'Active' : '-', 'getData() → r.policytype==="Renewal"'],
    ['Filter: View (High)', 'grosspremium >= ₹50,000', curView==='high' ? 'Active' : '-', 'getData() → grosspremium>=50000'],
  ];
  const chartRows = chartDataRows(d);
  const hasChartData = chartRows.length > 0;
  const allRows = [...kpiRows, ['', '', '', ''], ...filtRows];
  if (hasChartData) allRows.push(...['', '', '', ''], ['── Current Chart Data ──', chartTitle(), chartHint(), ''], ...chartRows);
  const closeBtn = '<button onclick="setChart(\'trend\')" style="float:right;padding:4px 12px;border:1px solid var(--border);border-radius:6px;background:var(--card);color:var(--muted);font-size:11px;cursor:pointer">✕ Close</button>';
  return `<div class="chart-section" style="overflow:auto"><h3>${closeBtn}🧮 Calculations & Logic <span class="hint">How each metric is derived</span></h3><div style="overflow:auto;max-height:500px"><table style="font-size:11px;width:100%"><thead><tr><th style="position:sticky;top:0;background:var(--panel);padding:6px 10px;text-align:left">Metric</th><th style="position:sticky;top:0;background:var(--panel);padding:6px 10px;text-align:left">Logic</th><th style="position:sticky;top:0;background:var(--panel);padding:6px 10px;text-align:left">Current Value</th><th style="position:sticky;top:0;background:var(--panel);padding:6px 10px;text-align:left">Formula</th></tr></thead><tbody>${
    allRows.map(r=>r[0]?'<tr>'+r.map(c=>'<td style="padding:5px 10px;border-bottom:1px solid var(--border);color:'+(r[0].startsWith('KPI')||r[0].startsWith('──')?'var(--accent)':'var(--text)')+'">'+c+'</td>').join('')+'</tr>':'').join('')
  }</tbody></table></div></div>`;
}

function tableHeaders() {
  if(curChart==='renewal') return '<th>VIN</th><th>Customer</th><th>Model</th><th>Status</th><th>Premium</th><th>Last Date</th>';
  return '<th>Policy No</th><th>Customer</th><th>Model</th><th>Insurance</th><th>Premium</th><th>Date</th>';
}

function tableTitle() {
  if(curChart==='renewal') return '🔍 VIN Status Overview';
  if(curView==='high') return '⭐ Highest Premium Policies';
  return '📋 Recent Policies';
}

function getTableData(d) {
  if(curChart==='renewal') {
    let v = vinDetail;
    if(curYear!=='all') v=v.filter(r=>r.lastDate?.startsWith(curYear));
    if(curView==='new') v=v.filter(r=>r.status==='New');
    else if(curView==='renewal') v=v.filter(r=>r.status==='Active');
    else if(curView==='high') v=v.filter(r=>r.lastPremium>=50000);
    return v.slice(0,15).map(r=>`<tr><td style="font-family:monospace;font-size:10px">${r.vin}</td><td>${r.customer}</td><td>${r.model}</td><td><span class="badge ${r.status==='Active'?'green':r.status==='New'?'blue':'red'}">${r.status}</span></td><td>₹${fmt(r.lastPremium)}</td><td>${r.lastDate}</td></tr>`);
  }
  const sorted=[...d].sort((a,b)=>(Number(b.grosspremium)||0)-(Number(a.grosspremium)||0));
  return sorted.slice(0,15).map(r=>`<tr><td style="font-family:monospace;font-size:10px">${r.policyno||'-'}</td><td>${r.customer_name||'-'}</td><td>${r.model||'-'}</td><td>${(r.insurancecompany||'-').substring(0,22)}</td><td><strong>₹${fmt(Number(r.grosspremium)||0)}</strong></td><td>${r.create_date||'-'}</td></tr>`);
}

function toggleToolbar() {
  document.getElementById('toolbarPanel').classList.toggle('collapsed');
}

loadData();
</script>
